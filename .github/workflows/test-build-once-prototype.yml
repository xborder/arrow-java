name: Test Build Once Prototype

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_VOLUME_PREFIX: ".docker/"

jobs:
  build-java:
    name: Build Java artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'
      - name: Build without tests
        shell: bash
        run: ci/scripts/build.sh . build jni
      - name: Pack reusable artifacts
        shell: bash
        run: |
          mkdir -p phase4-artifacts/m2-repository/org/apache
          cp -a "${HOME}/.m2/repository/org/apache/arrow" phase4-artifacts/m2-repository/org/apache/
          tar -czf phase4-java-build.tgz build phase4-artifacts
      - name: Upload reusable artifacts
        uses: actions/upload-artifact@v5
        with:
          name: phase4-java-build
          path: phase4-java-build.tgz
          retention-days: 1

  test-prebuilt-java:
    name: Test prebuilt Java artifacts on ${{ matrix.os }} JDK ${{ matrix.jdk }}
    needs: build-java
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            jdk: 17
          - os: ubuntu-latest
            jdk: 21
          - os: ubuntu-latest
            jdk: 23
          - os: macos-latest
            jdk: 17
          - os: windows-latest
            jdk: 17
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}
          cache: 'maven'
      - name: Download reusable artifacts
        uses: actions/download-artifact@v6
        with:
          name: phase4-java-build
      - name: Restore reusable artifacts
        shell: bash
        run: |
          tar -xzf phase4-java-build.tgz
          mkdir -p "${HOME}/.m2/repository/org/apache"
          cp -a phase4-artifacts/m2-repository/org/apache/arrow "${HOME}/.m2/repository/org/apache/"
      - name: Run tests without compiler lifecycle
        shell: bash
        run: |
          set -o pipefail
          pushd build
          mvn \
            -B \
            -T 2C \
            -Darrow.test.dataRoot="${GITHUB_WORKSPACE}/testing/data" \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
            -DfailIfNoTests=false \
            surefire:test | tee ../phase4-surefire.log
          popd

          if grep -E "Compiling [0-9]+ source files?" phase4-surefire.log; then
            echo "Unexpected compilation occurred while running prebuilt tests."
            exit 1
          fi

          if ! grep -q "Tests run:" phase4-surefire.log; then
            echo "No surefire test summary found; tests may have been skipped."
            exit 1
          fi

  build-cdata:
    name: Build C Data artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JDK: 17
      MAVEN: 3.9.9
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Cache Docker Volumes
        uses: actions/cache@v5
        with:
          path: .docker
          key: phase4-cdata-${{ env.JDK }}-${{ env.MAVEN }}-${{ hashFiles('compose.yaml', '**/pom.xml') }}
          restore-keys: phase4-cdata-${{ env.JDK }}-${{ env.MAVEN }}-
      - name: Build C Data without tests
        shell: bash
        run: |
          rm -rf .phase4-cdata
          mkdir -p .phase4-cdata
          docker compose run \
            --rm \
            -e CI=true \
            -e ARROW_JAVA_CDATA=ON \
            conda-jni-cdata \
            /bin/bash -lc '
              set -euo pipefail
              /arrow-java/ci/scripts/jni_build.sh \
                /arrow-java \
                /arrow-java/.phase4-cdata/jni-build \
                /arrow-java/.phase4-cdata/build \
                /arrow-java/.phase4-cdata/jni-dist
              ARROW_JAVA_CDATA=ON \
                /arrow-java/ci/scripts/build.sh \
                /arrow-java \
                /arrow-java/.phase4-cdata/java-build \
                /arrow-java/.phase4-cdata/jni-dist
              mkdir -p /arrow-java/.phase4-cdata/m2-repository/org/apache
              cp -a \
                /root/.m2/repository/org/apache/arrow \
                /arrow-java/.phase4-cdata/m2-repository/org/apache/
            '
          sudo chown -R "$(id -u):$(id -g)" .phase4-cdata
          if [ -d .docker ]; then
            sudo chown -R "$(id -u):$(id -g)" .docker
          fi
      - name: Pack reusable C Data artifacts
        shell: bash
        run: tar -czf phase4-cdata-build.tgz .phase4-cdata
      - name: Upload reusable C Data artifacts
        uses: actions/upload-artifact@v5
        with:
          name: phase4-cdata-build
          path: phase4-cdata-build.tgz
          retention-days: 1

  test-prebuilt-cdata:
    name: Test prebuilt C Data artifacts
    needs: build-cdata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JDK: 17
      MAVEN: 3.9.9
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Cache Docker Volumes
        uses: actions/cache@v5
        with:
          path: .docker
          key: phase4-cdata-test-${{ env.JDK }}-${{ env.MAVEN }}-${{ hashFiles('compose.yaml', '**/pom.xml') }}
          restore-keys: phase4-cdata-test-${{ env.JDK }}-${{ env.MAVEN }}-
      - name: Download reusable C Data artifacts
        uses: actions/download-artifact@v6
        with:
          name: phase4-cdata-build
      - name: Restore reusable C Data artifacts
        shell: bash
        run: tar -xzf phase4-cdata-build.tgz
      - name: Run C Data tests without compiler lifecycle
        shell: bash
        run: |
          docker compose run \
            --rm \
            -e CI=true \
            -e ARROW_JAVA_CDATA=ON \
            conda-jni-cdata \
            /bin/bash -lc '
              set -euo pipefail
              mkdir -p /root/.m2/repository/org/apache
              cp -a \
                /arrow-java/.phase4-cdata/m2-repository/org/apache/arrow \
                /root/.m2/repository/org/apache/
              cd /arrow-java/.phase4-cdata/java-build
              mvn \
                -B \
                -T 2C \
                -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
                -DfailIfNoTests=false \
                -Parrow-c-data \
                -pl c \
                -Darrow.c.jni.dist.dir=/arrow-java/.phase4-cdata/jni-dist \
                surefire:test | tee /arrow-java/.phase4-cdata-cdata-surefire.log

              if grep -E "Compiling [0-9]+ source files?" /arrow-java/.phase4-cdata-cdata-surefire.log; then
                echo "Unexpected compilation occurred while running prebuilt C Data tests."
                exit 1
              fi

              if ! grep -q "Tests run:" /arrow-java/.phase4-cdata-cdata-surefire.log; then
                echo "No C Data surefire test summary found; tests may have been skipped."
                exit 1
              fi
            '
